services:
  bgc_web:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://test:password@postgres:5432/plantbgc_db
      - UPLOAD_DIR=/app/shared_uploads
      - BASE_URL=http://localhost:8000  # Change to your public domain in production
    volumes:
      - ./plantbgc-service/uploads:/app/shared_uploads
    depends_on:
      postgres:
        condition: service_healthy

  bgc_worker:
    platform: linux/amd64          # tensorflow==1.15.4 has no ARM wheels — force x86_64 emulation
    build:
      context: .
      dockerfile: Dockerfile.bgc   # Python 3.7 — required by plantbgc (constraint: >=3.6,<3.8)
    command: python -u -m src.bgc_runner
    # Analyses can run up to ~10 hours. On SIGTERM the worker finishes its
    # current job and exits cleanly (see _handle_sigterm in bgc_runner.py) —
    # this grace period just ensures Docker doesn't SIGKILL it first.
    stop_grace_period: 12h
    environment:
      - DATABASE_URL=postgresql://test:password@postgres:5432/plantbgc_db
      - UPLOAD_DIR=/app/shared_uploads
      - BASE_URL=http://localhost:8000  # Change to your public domain in production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./plantbgc-service/uploads:/app/shared_uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: password
      POSTGRES_DB: plantbgc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d plantbgc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
